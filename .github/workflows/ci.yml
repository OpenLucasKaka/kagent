name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e '.[dev]'

      - name: Run checks
        run: scripts/run_checks.sh

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: self-correcting-agent-wheel-${{ matrix.python-version }}
          path: /tmp/self-correcting-agent-wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 14

      - name: Upload release manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: self-correcting-agent-release-manifest-${{ matrix.python-version }}
          path: /tmp/self-correcting-agent-release-manifest.json
          if-no-files-found: error
          retention-days: 14
